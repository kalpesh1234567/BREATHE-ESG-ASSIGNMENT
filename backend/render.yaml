services:
  - type: web
    name: breatheesg-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed_data"
    startCommand: "gunicorn breatheesg_project.wsgi --log-file -"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breatheesg-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breatheesg.vercel.app"

databases:
  - name: breatheesg-db
    databaseName: breatheesg
    user: breatheesg
    plan: free
